name: Build Debug APK

on:
  # Run on every push to any branch
  push:
    branches: [ "**" ]
  # Run on pull requests
  pull_request:
    branches: [ "**" ]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so getGitCommitHash() works

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Grant gradlew execute permission ──────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 4. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Build stableDebug APK ─────────────────────────────────────────────
      - name: Build stableDebug APK
        run: ./gradlew assembleStableDebug --no-daemon --stacktrace
        env:
          # Secrets are optional — build still works without them,
          # the app just won't have Simkl integration
          SIMKL_CLIENT_ID:     ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}

      # ── 6. Find the built APK ────────────────────────────────────────────────
      - name: Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      # ── 7. Rename APK to include commit hash ─────────────────────────────────
      - name: Rename APK
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          NEW_NAME="cloudstream-debug-${SHORT_SHA}.apk"
          cp "${{ steps.find_apk.outputs.apk_path }}" "$NEW_NAME"
          echo "apk_name=$NEW_NAME" >> $GITHUB_ENV

      # ── 8. Upload as artifact ────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cloudstream-debug-${{ github.sha }}
          path: ${{ env.apk_name }}
          retention-days: 30
          if-no-files-found: error
